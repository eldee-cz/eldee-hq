<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>eldee · reklamace</title>
<style>
  :root{ --ink:#08080A; --panel:#101013; --panel2:#16161B; --line:#26262e; --line2:#33333d;
    --bone:#F2F2EE; --muted:#85858f; --gold:#C9A227; --gold-dim:rgba(201,162,39,.13);
    --blood:#E0524F; --coach:#6fb3a0; --green:#4FAE84; }
  *{ box-sizing:border-box; }
  body{ margin:0; background:var(--ink); color:var(--bone); font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif; line-height:1.45; font-size:14px; }
  .wrap{ max-width:1320px; margin:0 auto; padding:22px 22px 80px; }
  .topbar{ display:flex; align-items:center; gap:14px; margin-bottom:16px; flex-wrap:wrap; }
  .topbar .back{ color:var(--muted); text-decoration:none; font-size:13px; font-weight:600; }
  .topbar .back:hover{ color:var(--bone); }
  .brand{ font-size:20px; font-weight:900; letter-spacing:-0.4px; } .brand em{ color:var(--gold); font-style:normal; }
  .spacer{ flex:1; } .saved{ font-size:11.5px; color:var(--coach); opacity:0; transition:opacity .3s; } .saved.show{ opacity:1; }
  .tabs{ display:flex; gap:6px; margin-bottom:18px; flex-wrap:wrap; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:5px; }
  .tabs button{ background:transparent; border:none; color:var(--muted); font:inherit; font-weight:800; font-size:14px; padding:10px 18px; border-radius:8px; cursor:pointer; }
  .tabs button.on{ background:var(--gold); color:#1a1400; }
  .tabs button:hover:not(.on){ color:var(--bone); background:var(--panel2); }
  .sec{ display:none; } .sec.on{ display:block; }
  .panel{ background:var(--panel); border:1px solid var(--line); border-radius:13px; overflow:hidden; margin-bottom:18px; }
  .panel-head{ display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--line); flex-wrap:wrap; }
  .panel-head h2{ font-size:12px; margin:0; color:var(--gold); text-transform:uppercase; letter-spacing:1.3px; font-family:ui-monospace,monospace; font-weight:700; }
  .panel-head .sum{ font-size:12px; color:var(--muted); } .grow{ flex:1; }
  .panel-body{ padding:14px 16px; } .panel-foot{ display:flex; gap:10px; align-items:center; padding:11px 16px; border-top:1px solid var(--line); flex-wrap:wrap; }
  .btn{ border-radius:8px; padding:8px 14px; font-size:12.5px; font-weight:700; cursor:pointer; border:1px solid var(--line2); background:var(--panel2); color:var(--bone); }
  .btn:hover{ border-color:var(--gold); } .btn.gold{ background:var(--gold); color:#1a1400; border-color:var(--gold); } .btn.ghost{ background:transparent; }
  .hint{ color:var(--muted); font-size:11.5px; } .empty{ padding:26px 16px; color:var(--muted); font-size:13px; text-align:center; }
  label.fld{ display:flex; flex-direction:column; gap:4px; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
  input,select,textarea{ background:var(--ink); border:1px solid var(--line2); color:var(--bone); border-radius:7px; padding:8px 9px; font:inherit; font-size:13px; }
  input:focus,select:focus,textarea:focus{ outline:none; border-color:var(--gold); }
  table.grid{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.grid th{ text-align:left; background:#1b1b21; color:var(--muted); font-weight:700; font-size:10px; text-transform:uppercase; letter-spacing:.5px; padding:8px 10px; white-space:nowrap; border-bottom:1px solid var(--line2); }
  table.grid td{ padding:8px 10px; border-bottom:1px solid var(--line); vertical-align:top; }
  .gridwrap{ overflow-x:auto; }
  .del{ background:none; border:none; color:#5a5a63; cursor:pointer; font-size:14px; padding:6px; } .del:hover{ color:var(--blood); }
  .pill{ font-size:10px; padding:2px 8px; border-radius:20px; background:var(--panel2); border:1px solid var(--line2); color:var(--muted); }
  a{ color:var(--gold); }
  footer{ color:#4a4a52; font-size:11.5px; font-family:ui-monospace,monospace; margin-top:30px; }
  .fgrid{ display:grid; grid-template-columns:repeat(4,1fr); gap:10px 12px; }
  .fgrid .fld.span2{ grid-column:span 2; }
  .fgrid input,.fgrid select,.fgrid textarea{ width:100%; }
  .fbar{ max-width:170px; }
  details.panel > summary{ list-style:none; cursor:pointer; padding:13px 16px; color:var(--muted); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.1px; font-family:ui-monospace,monospace; }
  details.panel > summary::-webkit-details-marker{ display:none; }
  details.panel > summary::before{ content:"▸ "; color:var(--gold); }
  details.panel[open] > summary::before{ content:"▾ "; }
  details.panel > summary:hover{ color:var(--bone); }
  .toast{ position:fixed; left:50%; bottom:24px; transform:translateX(-50%) translateY(8px); background:var(--green); color:#04130c; font-weight:800; font-size:13px; padding:11px 20px; border-radius:10px; box-shadow:0 6px 24px rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:opacity .22s, transform .22s; z-index:60; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  @media (max-width:880px){ .fgrid{ grid-template-columns:repeat(2,1fr); } }
  @media (max-width:680px){ input,select,textarea{ font-size:16px; } .tabs button{ font-size:13px; padding:10px 13px; }
    .fgrid{ grid-template-columns:1fr; } .fgrid .fld.span2{ grid-column:span 1; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <a href="index.html" class="back">← HQ</a>
    <div class="brand">eldee · <em>reklamace &amp; vrácení</em></div>
    <div class="spacer"></div>
    <span class="saved" id="savedNote">✓ uloženo</span>
  </div>

  <div class="tabs" id="tabs">
    <button data-sec="rz" class="on">🙋 Reklamace zákazníka</button>
    <button data-sec="rd">🏭 Reklamace dodavateli</button>
    <button data-sec="vr">↩️ Vrácení do 14 dnů</button>
    <button data-sec="nastaveni">⚙️ Lhůty &amp; nastavení</button>
    <button data-sec="zaloha">💾 Záloha</button>
  </div>

  <section class="sec on" data-sec="rz"><div id="rzRoot"></div></section>
  <section class="sec" data-sec="rd"><div id="rdRoot"></div></section>
  <section class="sec" data-sec="vr"><div id="vrRoot"></div></section>
  <section class="sec" data-sec="nastaveni"><div id="setRoot"></div></section>
  <section class="sec" data-sec="zaloha"><div id="zalRoot"></div></section>

  <footer>eldee HQ · reklamace · data jen v tomto prohlížeči (citlivé — nesdílet)</footer>
</div>
<div class="toast" id="toast"></div>

<script src="reklamace-core.js"></script>
<script>
const $ = id => document.getElementById(id);

// ───────── VARIANTNÍ ČÍSELNÍK (sdílený se Skladem/Objednávkami — SKU sedí 1:1)
const ALL8 = [[],['grip'],['kapsa'],['dira'],['grip','kapsa'],['grip','dira'],['kapsa','dira'],['grip','kapsa','dira']];
const TUBE_FEAT = [[],['kapsa'],['dira'],['kapsa','dira']];
const SOCK_SIZES = ['S','M','L','XL'];
const TUBE_SIZES = ['S','M','L'];
const PRODUCTS = [
  { id:'navlek',  name:'Návlek/tunel',        code:'NAV', feat:TUBE_FEAT, sizes:TUBE_SIZES },
  { id:'ponozka', name:'Tréninková ponožka',  code:'PON', feat:ALL8,      sizes:SOCK_SIZES },
  { id:'nizka',   name:'Nízká štulpna',       code:'NIZ', feat:ALL8,      sizes:SOCK_SIZES },
  { id:'vysoka',  name:'Vysoká štulpna',      code:'VYS', feat:ALL8,      sizes:SOCK_SIZES },
  { id:'bundle',  name:'Set',                 code:'BND', feat:ALL8,      sizes:SOCK_SIZES },
];
let COLORS = [ {name:'Bílá'}, {name:'Černá'} ];
const FL = { grip:'Grip', kapsa:'Kapsa', dira:'Díra' };
const FC = { grip:'G', kapsa:'K', dira:'D' };
const FEAT_ORDER = ['grip','kapsa','dira'];
const noDia = s => (s||'').normalize('NFD').split('').filter(c=>{const n=c.charCodeAt(0);return n<768||n>879;}).join('');
const colorCode = name => (noDia(name).substring(0,3).toUpperCase())||'XXX';
const featNorm = a => FEAT_ORDER.filter(f=>(a||[]).includes(f));
const featKey = a => featNorm(a).join(',');
const featText = a => { const n=featNorm(a); return n.length ? n.map(f=>FL[f]).join('+') : 'Základní'; };
const featCode = a => { const n=featNorm(a); return n.length ? n.map(f=>FC[f]).join('') : '0'; };
const prodDef = id => PRODUCTS.find(p=>p.id===id) || PRODUCTS[0];
const skuOf = (prodId,color,feat,size) => `${prodDef(prodId).code}-${colorCode(color)}-${featCode(feat)}-${size}`;
const recompSku = c => { c.sku = (c.produkt && c.color && c.size) ? skuOf(c.produkt, c.color, c.feat, c.size) : ''; return c.sku; };

// ───────── ÚLOŽIŠTĚ
const LS_KEY = 'eldeeReklamace';
const DEFAULT_SETTINGS = { lhutaVyrizeni:30, zarukaMesice:24, lhutaOdstoupeni:14, lhutaVraceniPenez:14,
  zpusoby:['oprava','výměna','sleva','vrácení peněz','dobropis','zamítnuto'] };
let STORE = { seq:{RZ:0,RD:0,VR:0}, claims:[], settings:Object.assign({},DEFAULT_SETTINGS), updated:'' };
let editId = null;   // id právě otevřeného případu (napříč záložkami)
const FILTER = { RZ:{q:'',stav:'',termin:''}, RD:{q:'',stav:'',termin:''}, VR:{q:'',stav:'',termin:''} };

function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
    if (d.seq) STORE.seq = Object.assign({RZ:0,RD:0,VR:0}, d.seq);
    if (Array.isArray(d.claims)) STORE.claims = d.claims;
    STORE.settings = Object.assign({}, DEFAULT_SETTINGS, d.settings||{});
  }catch(e){}
}
let savedTimer;
function save(){
  STORE.updated = new Date().toISOString();
  localStorage.setItem(LS_KEY, JSON.stringify(STORE));
  const el = $('savedNote'); if(el){ el.classList.add('show'); clearTimeout(savedTimer); savedTimer=setTimeout(()=>el.classList.remove('show'),1400); }
}
function todayISO(){ const d=new Date(); d.setHours(0,0,0,0); return d.toISOString().slice(0,10); }
function toast(msg){ const el=$('toast'); if(!el) return; el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),1700); }
function escT(s){ return String(s==null?'':s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// sklad (read-only) + dodavatelé (read-only)
function loadStock(){ try{ return JSON.parse(localStorage.getItem('eldeeData')||'{}'); }catch(e){ return {}; } }
function loadSuppliers(){ try{ const o=JSON.parse(localStorage.getItem('eldeeOrders')||'{}'); return Array.isArray(o.suppliers)?o.suppliers:[]; }catch(e){ return []; } }
function syncColorsFromStock(){ const sd=loadStock(); if(Array.isArray(sd.colorsList)&&sd.colorsList.length) COLORS=sd.colorsList.map(n=>({name:n})); }
function skuStock(sku){ const sd=loadStock(); return (sd.cardStock && sd.cardStock[sku]) || 0; }
function claimStockOf(sku){ const sd=loadStock(); return (sd.claimStock && sd.claimStock[sku]) || {own:0,supplier:0}; }
function supName(id){ const s=loadSuppliers().find(x=>String(x.id)===String(id)); return s? (s.name||('#'+id)) : '—'; }

// ───────── VÝBĚR VARIANTY (produkt + barva + provedení + velikost) → SKU se dopočítá
function variantPicker(c){
  const p = prodDef(c.produkt || PRODUCTS[2].id);
  if(!c.produkt) c.produkt = p.id;
  const prodOpts = PRODUCTS.map(x=>`<option value="${x.id}"${x.id===c.produkt?' selected':''}>${escT(x.name)}</option>`).join('');
  const colOpts = COLORS.map(x=>`<option value="${escT(x.name)}"${x.name===c.color?' selected':''}>${escT(x.name)}</option>`).join('');
  const curFeatKey = featKey(c.feat||[]);
  const featOpts = p.feat.map((f,i)=>`<option value="${i}"${featKey(f)===curFeatKey?' selected':''}>${escT(featText(f))}</option>`).join('');
  const sizeOpts = p.sizes.map(s=>`<option value="${s}"${s===c.size?' selected':''}>${s}</option>`).join('');
  return `<label class="fld">Produkt<select data-vf="produkt">${prodOpts}</select></label>
    <label class="fld">Barva<select data-vf="color">${colOpts}</select></label>
    <label class="fld">Provedení<select data-vf="feat">${featOpts}</select></label>
    <label class="fld">Velikost<select data-vf="size">${sizeOpts}</select></label>`;
}
// přečte výběr varianty z DOM do claimu (volá saveForm)
function readVariant(root, c){
  const g = sel => root.querySelector('[data-vf="'+sel+'"]');
  if(!g('produkt')) return;
  c.produkt = g('produkt').value;
  c.color = g('color').value;
  const p = prodDef(c.produkt);
  const fi = Math.min(Number(g('feat').value)||0, p.feat.length-1);
  c.feat = (p.feat[fi]||[]).slice();
  const szVal = g('size').value;
  c.size = p.sizes.includes(szVal) ? szVal : p.sizes[0];
  recompSku(c);
}

// ───────── SPOLEČNÉ: založení a uložení případu
function newClaim(typ){
  const r = window.nextNumber(typ, STORE.seq[typ]); STORE.seq[typ] = r.seq;
  const base = { id:Date.now(), typ, cislo:r.cislo, created:new Date().toISOString(),
    stav:(typ==='VR'?'oznámeno':'přijato'),
    produkt:PRODUCTS[2].id, color:(COLORS[0]&&COLORS[0].name)||'Bílá', feat:[], size:'M', sku:'',
    pocet:1, popis:'', navrh:'', provedeni:'', datumVyrizeni:'', pozn:'', history:[] };
  recompSku(base);
  if (typ==='RZ') Object.assign(base, { zakaznik:{jmeno:'',kontakt:''}, cisloObj:'', datumNakupu:'', datumUplatneni:todayISO(), lhutaDni:STORE.settings.lhutaVyrizeni, rdId:null });
  if (typ==='RD') Object.assign(base, { supplierId:null, datumReklamace:todayISO(), datumOdeslani:'', terminDni:30, objId:'', rzId:null });
  if (typ==='VR') Object.assign(base, { zakaznik:{jmeno:'',kontakt:''}, cisloObj:'', datumPrevzeti:'', datumOdstoupeni:todayISO(), lhutaDni:STORE.settings.lhutaVraceniPenez, castka:0 });
  STORE.claims.unshift(base); return base;
}
function rootIdForTyp(typ){ return ({RZ:'rzRoot',RD:'rdRoot',VR:'vrRoot'})[typ]; }
function activeTyp(){ const on=document.querySelector('#tabs button.on'); return ({rz:'RZ',rd:'RD',vr:'VR'})[on.dataset.sec] || 'RZ'; }
function saveForm(typ){
  const c = STORE.claims.find(x=>x.id===editId); if(!c) return;
  const root = $(rootIdForTyp(typ));
  root.querySelectorAll('[data-f]').forEach(el=>{
    const path=el.dataset.f; const val = el.type==='number' ? Number(el.value) : el.value;
    if (path.includes('.')){ const [a,b]=path.split('.'); c[a]=c[a]||{}; c[a][b]=val; } else c[path]=val;
  });
  readVariant(root, c);
  save();
}
function openClaim(id){ editId=id; renderActive(); }
function delClaim(id, typ){ if(confirm('Smazat tento případ?')){ STORE.claims=STORE.claims.filter(c=>c.id!==id); if(editId===id) editId=null; save(); renderActive(); } }

// ───────── pomůcky pro řádky / lhůty
function termCell(dl, done){
  if(done) return '<td>—</td>';
  const cls = window.deadlineClass(dl);
  const style = cls==='over'?'color:var(--blood);font-weight:700':cls==='warn'?'color:var(--gold);font-weight:700':'';
  return `<td style="${style}">${dl} d</td>`;
}
function isDone(c){ return c.stav==='vyřízeno'||c.stav==='zamítnuto'; }
function zboziCell(c){ return `${escT(c.sku||'—')} ×${c.pocet}`; }
function zpusobOpts(sel){ return '<option value=""></option>'+STORE.settings.zpusoby.map(z=>`<option${z===sel?' selected':''}>${escT(z)}</option>`).join(''); }
function statusOptions(typ){ return typ==='VR' ? ['oznámeno','zboží přijato','vyřízeno','zamítnuto'] : ['přijato','v řešení','vyřízeno','zamítnuto']; }
function statusSelect(c){ return `<select data-status="${c.id}" style="font-size:11px;padding:5px 7px;min-width:104px">${statusOptions(c.typ).map(s=>`<option${s===c.stav?' selected':''}>${s}</option>`).join('')}</select>`; }
// rychlá změna stavu z řádku (uzavřené automaticky dostanou datum vyřízení)
function setStatusFromRow(id, val){ const c=STORE.claims.find(x=>x.id===id); if(!c) return false;
  c.stav=val; if((val==='vyřízeno'||val==='zamítnuto')&&!c.datumVyrizeni) c.datumVyrizeni=todayISO(); save(); return true; }
function stockLine(c){ if(!c.sku) return '';
  const cs=claimStockOf(c.sku);
  return `<span class="hint">📦 ${escT(c.sku)} · 🟢 prodejní ${skuStock(c.sku)} · 🔧 u nás ${cs.own||0} · 🚚 u dodavatele ${cs.supplier||0}</span>`; }
function moveBtns(ids){ return ids.map(id=>`<button class="btn" data-move="${id}">${escT(window.STOCK_ACTIONS[id].label)}</button>`).join(' '); }
function historyHTML(c){ if(!c.history||!c.history.length) return '';
  return `<div class="panel-body" style="border-top:1px solid var(--line)"><div class="hint" style="margin-bottom:6px">📜 Historie pohybů:</div>`
    + c.history.slice().reverse().map(h=>`<div class="hint">• ${new Date(h.ts).toLocaleString('cs-CZ')} — ${escT(h.text)}</div>`).join('') + `</div>`; }
// Skladový pohyb (převodka): přes ověřené jádro applyMove + doklad ve Skladu při pohybu přes prodejní kbelík
function doStockMove(claim, actionId){
  const act = window.STOCK_ACTIONS[actionId]; if(!act) return;
  if(!claim.sku){ alert('Nejdřív vyber zboží (produkt + barva + provedení + velikost).'); return; }
  const qty = Number(claim.pocet)||0; if(qty<=0){ alert('Počet musí být větší než 0.'); return; }
  const sd = loadStock();
  sd.cardStock = sd.cardStock || {};
  sd.claimStock = sd.claimStock || {};
  const after = window.applyMove({cardStock:sd.cardStock, claimStock:sd.claimStock}, claim.sku, qty, act.from, act.to);
  sd.cardStock = after.cardStock; sd.claimStock = after.claimStock;
  if(act.from==='prodej'){ // výdej z prodejního skladu (doklad VY s důvodem reklamace)
    sd.issues = Array.isArray(sd.issues)?sd.issues:[]; sd.issueSeq=(sd.issueSeq||0)+1;
    sd.issues.unshift({ n:sd.issueSeq, created:new Date().toISOString(), by:'Reklamace '+claim.cislo, note:act.label,
      lines:[{ product:claim.produkt, color:claim.color, feat:(claim.feat||[]).slice(), size:claim.size, qty, reason:'reklamace', price:0 }] });
  }
  if(act.to==='prodej'){ // příjem do prodejního skladu (doklad příjemky)
    sd.receipts = Array.isArray(sd.receipts)?sd.receipts:[]; sd.receiptSeq=(sd.receiptSeq||0)+1;
    sd.receipts.unshift({ n:sd.receiptSeq, created:new Date().toISOString(), by:'Reklamace '+claim.cislo, faktura:claim.cislo, due:'', paid:false,
      lines:[{ product:claim.produkt, color:claim.color, feat:(claim.feat||[]).slice(), size:claim.size, qty, net:0, num:claim.cislo, due:'' }] });
  }
  sd.updated=new Date().toISOString();
  localStorage.setItem('eldeeData', JSON.stringify(sd));
  claim.history = claim.history||[];
  claim.history.push({ ts:new Date().toISOString(), text:act.label+' (×'+qty+' '+claim.sku+')' });
  save();
  toast('📦 Sklad aktualizován');
}

// ───────── rozdělení otevřené / uzavřené + skládání sekce
function splitClaims(typ){ const today=todayISO(); const all=STORE.claims.filter(c=>c.typ===typ && window.matchesFilter(c, FILTER[typ], today)); return { open:all.filter(c=>!isDone(c)), closed:all.filter(isDone) }; }
function filterBar(typ){
  const f=FILTER[typ]; const stavy=statusOptions(typ);
  return `<input class="fbar" data-ft="q" data-typ="${typ}" placeholder="🔍 hledat…" value="${escT(f.q)}">
    <select class="fbar" data-ft="stav" data-typ="${typ}"><option value="">stav: vše</option>${stavy.map(s=>`<option${s===f.stav?' selected':''}>${s}</option>`).join('')}</select>
    <select class="fbar" data-ft="termin" data-typ="${typ}"><option value="">termín: vše</option><option value="over"${f.termin==='over'?' selected':''}>po termínu</option><option value="soon"${f.termin==='soon'?' selected':''}>blíží se (≤3 d)</option></select>`;
}
function tableHead(typ){
  if(typ==='RD') return '<th>Číslo</th><th>Dodavatel</th><th>Zboží</th><th>Vada</th><th>Stav</th><th>Zbývá</th><th></th>';
  if(typ==='VR') return '<th>Číslo</th><th>Zákazník</th><th>Zboží</th><th>Částka</th><th>Stav</th><th>Zbývá</th><th></th>';
  return '<th>Číslo</th><th>Zákazník</th><th>Zboží</th><th>Vada</th><th>Stav</th><th>Zbývá</th><th></th>';
}
function rowsFn(typ,list){ return typ==='RD'?rowsRD(list):typ==='VR'?rowsVR(list):rowsRZ(list); }
function gridTable(typ, rowsHtml){ return `<div class="gridwrap"><table class="grid"><thead><tr>${tableHead(typ)}</tr></thead><tbody>${rowsHtml}</tbody></table></div>`; }
function sectionHTML(typ, title, addBtnId, addLabel){
  const {open,closed}=splitClaims(typ);
  const openRows = open.length ? rowsFn(typ,open) : '<tr><td colspan="7" class="empty">Žádná otevřená položka — vše vyřešené 🎉</td></tr>';
  const main = `<div class="panel"><div class="panel-head"><h2>${title}</h2>
    <span class="sum">${rowSummary(typ)}</span><span class="grow"></span>
    ${filterBar(typ)}
    <button class="btn gold" id="${addBtnId}">${addLabel}</button></div>
    <div class="panel-body">${gridTable(typ, openRows)}</div></div>`;
  const closedHtml = closed.length
    ? `<details class="panel"><summary>Uzavřené (${closed.length})</summary><div class="panel-body">${gridTable(typ, rowsFn(typ,closed))}</div></details>`
    : '';
  return main + closedHtml;
}

// souhrn nad záložkou (otevřené / po termínu) — filtr doplní Blok D
function rowSummary(typ){
  const today=todayISO();
  const all=STORE.claims.filter(c=>c.typ===typ);
  const open=all.filter(c=>!isDone(c)).length;
  const over=all.filter(c=>window.matchesFilter(c,{q:'',stav:'',termin:'over'},today)).length;
  return `otevřených ${open}${over?` · <span style="color:var(--blood)">po termínu ${over}</span>`:''}`;
}

$('tabs').addEventListener('click', e=>{

  document.querySelectorAll('#tabs button').forEach(x=>x.classList.toggle('on', x===b));
  document.querySelectorAll('section.sec').forEach(s=>s.classList.toggle('on', s.dataset.sec===b.dataset.sec));
});

// RZ root: klik + změna výběru produktu (přepočítá provedení/velikost)
$('rzRoot').addEventListener('click', e=>{
  const t=e.target;
  if(t.id==='rzAdd'){ const c=newClaim('RZ'); editId=c.id; save(); renderRZ(); return; }
  if(t.dataset.edit!=null){ openClaim(Number(t.dataset.edit)); return; }
  if(t.dataset.del!=null){ delClaim(Number(t.dataset.del),'RZ'); return; }
  if(t.id==='frmClose'){ editId=null; renderRZ(); return; }
  if(t.id==='frmSave'){ saveForm('RZ'); editId=null; renderRZ(); toast('✓ Uloženo'); return; }
  if(t.dataset.move){ const c=STORE.claims.find(x=>x.id===editId); if(c){ saveForm('RZ'); if(confirm(window.STOCK_ACTIONS[t.dataset.move].label+'\n\nZapsat tento pohyb do skladu?')){ doStockMove(c,t.dataset.move); renderRZ(); } } return; }
  if(t.id==='rzToRd'){
    saveForm('RZ');
    const rz=STORE.claims.find(x=>x.id===editId); if(!rz) return;
    const rd=newClaim('RD');
    Object.assign(rd, { produkt:rz.produkt, color:rz.color, feat:(rz.feat||[]).slice(), size:rz.size, pocet:rz.pocet, popis:rz.popis, rzId:rz.id });
    recompSku(rd); rz.rdId=rd.id;
    rd.history.push({ts:new Date().toISOString(), text:'Vzniklo z '+rz.cislo});
    save();
    document.querySelector('#tabs button[data-sec="rd"]').click();
    editId=rd.id; renderRD();
    return;
  }
});
$('rzRoot').addEventListener('change', e=>{
  if(e.target.dataset && e.target.dataset.status){ if(setStatusFromRow(Number(e.target.dataset.status), e.target.value)) renderRZ(); return; }

    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='eldee-reklamace-'+todayISO()+'.json'; a.click();

  }

    if(confirm('Opravdu smazat VŠECHNY reklamace a vrácení? Nevratné.')){
      STORE={ seq:{RZ:0,RD:0,VR:0}, claims:[], settings:Object.assign({},DEFAULT_SETTINGS), updated:'' };
      editId=null; save(); renderAll(); toast('Vynulováno');
    }
  }
});
$('zalRoot').addEventListener('change', e=>{
  if(e.target.id!=='zalImp' || !e.target.files[0]) return;
  const fr=new FileReader();
  fr.onload=()=>{ try{
      const d=JSON.parse(fr.result);
      if(d && Array.isArray(d.claims)){
        STORE = Object.assign({ seq:{RZ:0,RD:0,VR:0} }, d);
        STORE.settings = Object.assign({}, DEFAULT_SETTINGS, d.settings||{});
        editId=null; save(); renderAll(); alert('Záloha načtena ('+d.claims.length+' případů).');
      } else alert('Neplatný soubor zálohy.');
    }catch(err){ alert('Chyba při načítání: '+err.message); } };
  fr.readAsText(e.target.files[0]);
});

// Filtr / hledání (delegovaně přes .fbar)
function renderByTyp(typ){ if(typ==='RZ') renderRZ(); else if(typ==='RD') renderRD(); else renderVR(); }
document.addEventListener('input', e=>{
  const el=e.target; if(!el.classList || !el.classList.contains('fbar')) return;
  const typ=el.dataset.typ, ft=el.dataset.ft;
  FILTER[typ][ft]=el.value; renderByTyp(typ);
  const back=document.querySelector('#'+rootIdForTyp(typ)+' .fbar[data-ft="'+ft+'"]');
  if(back){ back.focus(); const n=back.value.length; try{ back.setSelectionRange(n,n); }catch(_){} }
});
document.addEventListener('change', e=>{
  const el=e.target; if(!el.classList || !el.classList.contains('fbar') || el.tagName!=='SELECT') return;
  FILTER[el.dataset.typ][el.dataset.ft]=el.value; renderByTyp(el.dataset.typ);
});

// klik kamkoliv do datumového pole otevře kalendář (PC i mobil)
document.addEventListener('click', e=>{
  const el=e.target;
  if(el && el.tagName==='INPUT' && el.type==='date' && typeof el.showPicker==='function'){ try{ el.showPicker(); }catch(_){} }
});

syncColorsFromStock();
load();
renderAll();
</script>
</body>
</html>
